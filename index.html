<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Space Assault — a Galaga-style 3D space shooter in your browser. Pick a ship, dodge with barrel rolls, and blast the invaders."
    />
    <!-- Standalone (fullscreen) when launched from the home screen; iPhone
         Safari has no Fullscreen API, so this is its fullscreen path -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Space Assault" />
    <meta name="theme-color" content="#000008" />
    <!-- Social sharing -->
    <meta property="og:title" content="Space Assault" />
    <meta
      property="og:description"
      content="A Galaga-style 3D space shooter in your browser. Pick a ship, dodge with barrel rolls, and blast the invaders."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://space-assault.vercel.app/" />
    <meta property="og:image" content="https://space-assault.vercel.app/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <title>Space Assault</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
